name: Urbanflux Hubs CI

on:
  pull_request:
    branches: ["main"]
    paths:
      - 'urbanflux-hubs/**'
      - '.github/workflows/hubs-ci.yml'

  workflow_dispatch:

jobs:
  # ─── Security Scanning ───────────────────────────────────────────────
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --debug --only-verified

      - name: Trivy Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './urbanflux-hubs'
          ignore-unfixed: true
          format: 'table'
          severity: 'CRITICAL,HIGH'

  # ─── Frontend Build & Lint ───────────────────────────────────────────
  frontend-build:
    name: 🌐 Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: urbanflux-hubs/frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./urbanflux-hubs/frontend
        run: npm ci

      - name: Lint
        working-directory: ./urbanflux-hubs/frontend
        run: npm run lint

      - name: Build
        working-directory: ./urbanflux-hubs/frontend
        run: npm run build

  # ─── Backend Build & Vet ─────────────────────────────────────────────
  backend-build:
    name: ⚙️ Backend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: urbanflux-hubs/backend/go.sum

      - name: Go Vet
        working-directory: ./urbanflux-hubs/backend
        run: go vet ./...

      - name: Build
        working-directory: ./urbanflux-hubs/backend
        run: CGO_ENABLED=0 GOOS=linux go build -o server ./cmd/server/main.go

  # ─── Docker Build Verification ───────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build Verify
    needs: [security-scan, frontend-build, backend-build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./urbanflux-hubs/frontend
          push: false
          tags: urbanflux-hubs-frontend:pr-${{ github.event.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./urbanflux-hubs/backend
          push: false
          tags: urbanflux-hubs-backend:pr-${{ github.event.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
