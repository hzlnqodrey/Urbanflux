name: Publish Urbanflux Landing

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - 'urbanflux-landing/**'
      - '.github/workflows/landing-docker-publish.yml'

jobs:
  security-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # Secret Scanning
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --debug --only-verified

      # SAST - Trivy Repo Scan
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          severity: 'CRITICAL,HIGH'

      # Playwright Tests
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: urbanflux-landing/package-lock.json
      
      - name: Install dependencies
        working-directory: ./urbanflux-landing
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: ./urbanflux-landing
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        working-directory: ./urbanflux-landing
        run: npx playwright test

  build-and-push:
    needs: security-and-test
    runs-on: ubuntu-latest
    environment: DOCKER_USERNAME
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pre-check Secrets
        run: |
          if [ -z "$DOCKER_USERNAME" ]; then
            echo "::error::DOCKER_USERNAME secret is missing or empty"
            exit 1
          fi
          if [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "::error::DOCKER_PASSWORD secret is missing or empty"
            exit 1
          fi
          echo "Secrets are populated!"

      - name: Safe Echo Check
        run: |
          # Use string length to safely verify the secret without printing it
          USERNAME_LENGTH=${#DOCKER_USERNAME}
          echo "Username is set and is $USERNAME_LENGTH characters¸ long."
          
          # We cannot easily check the length of the password securely, 
          # but we can confirm it's not a dummy string.
          if [ "${{ secrets.DOCKER_PASSWORD }}" == "dummy" ]; then
             echo "::error::Password is set to a dummy value."
          else
             echo "Password appears to be a valid string."
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Post-check Docker Auth
        run: |
          if [ -f ~/.docker/config.json ]; then
            echo "Docker config file created successfully."
            # Check if auths for docker.io exists (safely parsing JSON)
            if grep -q "auths" ~/.docker/config.json && grep -q "https://index.docker.io/v1/" ~/.docker/config.json; then
              echo "✅ Docker login successful and credentials cached."
            else
              echo "❌ Docker login failed to cache credentials for docker.io."
              exit 1
            fi
          else
             echo "❌ Docker config file not found. Login failed."
             exit 1
          fi

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_USERNAME }}/urbanflux-landing
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./urbanflux-landing
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
